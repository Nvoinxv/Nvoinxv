name: Auto-Update Experience & Telemetry Tracker

on:
  schedule:
    # Runs every 1 hour at minute 0 (Real-Time Cron)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Real-Time Telemetry & Duration Script
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: python scripts/update_time.py

      - name: Commit and Push Real-Time Telemetry
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/data/time.json
          git diff --staged --quiet || (git commit -m "chore(auto-tracker): update experience & real-time telemetry [skip ci]" && git push)
